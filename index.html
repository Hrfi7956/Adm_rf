<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Portfolio | Hiroshi Rafi</title>
    <style>
        :root {
            --neon-green: #00ff00;
            --dark-bg: #010401;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        /* --- BACKGROUND ANIMATION --- */
        @keyframes matrix {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 1000px; }
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 200%;
            background-image: linear-gradient(0deg, rgba(0,255,0,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,255,0,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: matrix 30s linear infinite;
            z-index: -1;
        }

        /* --- SCANLINE & NOISE --- */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* --- CARD DESIGN --- */
        .cyber-card {
            width: 90%;
            max-width: 500px;
            background: rgba(0, 15, 0, 0.85);
            border: 1px solid var(--neon-green);
            padding: 35px;
            position: relative;
            box-shadow: 0 0 25px rgba(0, 255, 0, 0.2);
            backdrop-filter: blur(8px);
            clip-path: polygon(0 8%, 8% 0, 92% 0, 100% 8%, 100% 92%, 92% 100%, 8% 100%, 0 92%);
        }

        /* Corners */
        .c { position: absolute; width: 12px; height: 12px; border: 2px solid var(--neon-green); }
        .tl { top: 0; left: 0; border-right: none; border-bottom: none; }
        .tr { top: 0; right: 0; border-left: none; border-bottom: none; }
        .bl { bottom: 0; left: 0; border-right: none; border-top: none; }
        .br { bottom: 0; right: 0; border-left: none; border-top: none; }

        /* --- PROFILE PHOTO SECTION --- */
        .header { text-align: center; margin-bottom: 25px; }

        .photo-frame {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 15px;
        }

        /* Rotating Rings */
        .ring {
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top: 2px solid var(--neon-green);
            animation: spin 4s linear infinite;
        }
        .ring-inner { 
            width: 86%; height: 86%; top: 7%; left: 7%;
            border-bottom: 2px solid #00aaaa; 
            animation: spin 2s linear reverse infinite; 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .profile-pic {
            width: 75%; height: 75%;
            background: #001100;
            border-radius: 50%;
            position: absolute;
            top: 12.5%; left: 12.5%;
            border: 1px solid var(--neon-green);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Gambar Profil */
        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) sepia(0.5) hue-rotate(80deg); /* Efek Cyber/Hologram pada foto */
            opacity: 0.8;
        }

        /* Laser Scan Line */
        .profile-pic::after {
            content: "";
            position: absolute;
            width: 100%; height: 2px;
            background: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            animation: scan 2.5s ease-in-out infinite;
        }
        @keyframes scan { 0%, 100% { top: 0%; } 50% { top: 100%; } }

        /* --- TEXT --- */
        .glitch-name {
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 2px 0 #ff000033, -2px 0 #0000ff33;
        }

        .role {
            font-size: 11px;
            color: rgba(0, 255, 0, 0.6);
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* --- INFO LIST --- */
        .info-list { margin: 20px 0; }
        .info-item {
            border-bottom: 1px solid rgba(0, 255, 0, 0.1);
            padding: 8px 0;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .info-item span:first-child { color: rgba(0, 255, 0, 0.4); font-size: 10px; }

        .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .tag {
            font-size: 10px;
            border: 1px solid var(--neon-green);
            padding: 2px 8px;
        }

        /* --- LINK BUTTON --- */
        .contact-link {
            display: block;
            width: 100%;
            text-decoration: none;
            margin-top: 25px;
        }

        .cyber-btn {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 15px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .cyber-btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .cyber-btn::before {
            content: ">> ACCESS GRANTED <<";
            position: absolute;
            top: 100%; left: 0; width: 100%; height: 100%;
            background: var(--neon-green);
            color: #000;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }

        .cyber-btn:hover::before { top: 0; }

    </style>
</head>
<body>

    <div class="cyber-card">
        <div class="c tl"></div><div class="c tr"></div>
        <div class="c bl"></div><div class="c br"></div>

        <div class="header">
            <div class="photo-frame">
                <div class="ring"></div>
                <div class="ring-inner"></div>
                <div class="profile-pic">
                    <img src="hrf.jpg" alt="Hiroshi Rafi">
                </div>
            </div>
            <div class="glitch-name">HIROSHI RAFI</div>
            <p class="role">ID: NETWORK_SPECIALIST_HRV7844_02</p>
        </div>

        <div class="info-list">
            <div class="info-item">
                <span>LOCAL_BIO</span>
                <span>Majenang, Cilacap, ID</span>
            </div>
            <div class="info-item">
                <span>AGE_STATUS</span>
                <span>18 TAHUN</span>
            </div>
            <div class="info-item">
                <span>JAK</span>
                <span>KOM_SC (TEKNIK KOMPUTER JARINGAN)</span>
            </div>
            <div class="info-item" style="border:none;">
                <span>SKILLS</span>
                <div class="tags">
                    <span class="tag">Networking</span>
                    <span class="tag">SolarDIY</span>
                    <span class="tag">Mikrotik</span>
                </div>
            </div>
        </div>

        <a href="https://www.instagram.com/hirosi_rafi?igsh=anVtbzlxOXdiMDY4" class="contact-link" target="_blank">
            <div class="cyber-btn">INFO</div>
        </a>
    </div>

</body>
</html>
